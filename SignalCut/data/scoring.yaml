    hook_bonus: 0.12
    platforms: [tiktok, reels, shorts]

# ─── Padrões de Hook (primeiros 3 segundos) ──────────────────────────────────
hook_patterns:
  pergunta_retorica:
    pattern: "\\?"
    bonus: 0.12
  numero_especifico:
    pattern: "\\b\\d+\\b"
    bonus: 0.08
  imperativo:
    pattern: "^(para|olha|veja|escuta|sabia|imagine)"
    bonus: 0.10
  negacao_forte:
    pattern: "\\b(nunca|jamais|ninguém|impossível)\\b"
    bonus: 0.09
  tempo_limitado:
    pattern: "\\b(agora|hoje|urgente|rápido|antes que)\\b"
    bonus: 0.11

# ─── Conectivos de Retenção (indicam arco narrativo) ─────────────────────────
retention_connectives:
  - "mas"
  - "porém"
  - "no entanto"
  - "aí"
  - "então"
  - "e sabe o que aconteceu"
  - "mas espera"
  - "só que"
  - "resultado"
  - "conclusão"
  - "o problema é"
  - "a solução foi"
  - "descobri que"
