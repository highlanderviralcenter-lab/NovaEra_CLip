# SignalCut Hybrid — Configuração de Scoring e Arquétipos
# Este arquivo é atualizado automaticamente pelo learning_engine.py
# com base na performance real das plataformas.

version: "1.0"

# ─── Pesos do Combined Score ──────────────────────────────────────────────────
combined_weights:
  hook_strength:          0.30   # Impacto nos primeiros 3s (scroll stop)
  retention_score:        0.25   # Arco narrativo e conectivos de continuidade
  moment_strength:        0.20   # Clímax, virada, punchline
  shareability:           0.15   # Potencial de recompartilhamento
  platform_fit:           0.10   # Adequação às regras da plataforma

# ─── Fórmula do Decision Engine ──────────────────────────────────────────────
decision_weights:
  local_score:            0.50
  external_score:         0.30
  platform_fit:           0.10
  duration_fit:           0.05
  transcription_quality:  0.05

# ─── Limiares de Decisão ─────────────────────────────────────────────────────
decision_thresholds:
  aprovado:   9.0    # Render imediato
  rework:     7.0    # Revisão manual
  descartar:  0.0    # Abaixo de 7.0

# ─── Faixa de Duração Alvo ───────────────────────────────────────────────────
duration:
  min_seconds:   18
  max_seconds:   35
  ideal_seconds: 27
  penalty_per_second_over:  0.05
  penalty_per_second_under: 0.08

# ─── Arquétipos Emocionais ────────────────────────────────────────────────────
# weight: peso inicial (atualizado pelo learning_engine)
# triggers: palavras/padrões que ativam o arquétipo
archetypes:

  curiosidade:
    weight: 0.30
    triggers:
      - "segredo"
      - "ninguém conta"
      - "poucos sabem"
      - "descobri"
      - "revelação"
      - "você não sabe"
      - "mistério"
    hook_bonus: 0.15
    platforms: [tiktok, reels, shorts]

  medo_urgencia:
    weight: 0.28
    triggers:
      - "pare agora"
      - "cuidado"
      - "perigo"
      - "erro fatal"
      - "antes que"
      - "urgente"
      - "último momento"
    hook_bonus: 0.18
    platforms: [tiktok, reels]

  indignacao:
